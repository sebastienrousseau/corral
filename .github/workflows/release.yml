name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      # Required so goreleaser can push the Docker image to
      # ghcr.io/sebastienrousseau/corral for the MCP registry entry.
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26.1'

      # Docker toolchain for the goreleaser dockers: + docker_manifests:
      # sections. QEMU handles arm64 emulation on the amd64 runner.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Keyless cosign signing uses the same OIDC token our provenance
      # attestations do, so there is no long-lived signing key to leak.
      # goreleaser's docker_signs: block below invokes the installed
      # cosign binary; this step just makes it available on PATH.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Run GoReleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          AUR_KEY: ${{ secrets.AUR_KEY }}

      # SLSA build provenance for every artifact goreleaser emitted:
      # tarballs, .deb, .rpm, checksums.txt. The subject-checksums file
      # is generated by goreleaser at dist/checksums.txt; passing it
      # to actions/attest-build-provenance is the fastest way to attest
      # a batch of files in one shot without listing each name here.
      # Users verify with `gh attestation verify <file> --owner sebastienrousseau`.
      #
      # The Docker image published by goreleaser is signed separately
      # via the docker_signs: block in .goreleaser.yaml, which invokes
      # the cosign binary installed above. Both mechanisms feed
      # the OpenSSF Scorecard Signed-Releases check.
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: dist/checksums.txt
