name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
        shell: bash

      - name: Scan for secrets
        run: gitleaks detect --source . --verbose
        shell: bash

  signatures:
    name: Verify commit signatures
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Check all commits are signed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          failed=0
          for sha in $(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/commits --jq '.[].sha'); do
            verified="$(gh api repos/${{ github.repository }}/commits/"$sha" --jq '.commit.verification.verified')"
            if [[ "$verified" != "true" ]]; then
              reason="$(gh api repos/${{ github.repository }}/commits/"$sha" --jq '.commit.verification.reason')"
              echo "::error::Unverified commit $sha (reason: $reason)"
              failed=1
            fi
          done
          if [[ "$failed" -eq 1 ]]; then
            exit 1
          fi
          echo "All commits verified by GitHub."
        shell: bash
