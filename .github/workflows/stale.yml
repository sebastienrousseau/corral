name: Stale

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark Stale
    uses: sebastienrousseau/pipelines/.github/workflows/stale.yml@186372a9033a4a2ab2c1157866a5a0bc37410683
    with:
      days-before-stale: 60
      days-before-close: 14
      exempt-issue-labels: 'pinned,security,bug'
      exempt-pr-labels: 'pinned,security'
