name: Container Security

# Static Dockerfile lint (hadolint) on every PR that touches the
# Dockerfile, plus a Trivy CVE scan of the published multi-arch OCI
# image after each successful goreleaser run. Findings are advisory
# on the first pass — we upload them as GitHub Code Scanning results
# so they surface in the Security tab, but the workflow does not
# block merges. Once we've reviewed a few runs and understand the
# noise floor, the hadolint job can be flipped to `continue-on-error:
# false` and the trivy job's severity threshold can be tightened.

on:
  pull_request:
    paths:
      - 'Dockerfile'
      - '.goreleaser.yaml'
      - '.github/workflows/container-scan.yml'
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

jobs:
  hadolint:
    name: hadolint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          show-progress: false

      - name: Run hadolint on the Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: Dockerfile
          # SARIF output feeds the GitHub Code Scanning surface below,
          # so findings appear alongside CodeQL / gosec / Scorecard
          # alerts.
          format: sarif
          output-file: hadolint.sarif
          # DL3018 = "always pin apk add versions" — we do pin the
          # base image digest itself, which upstream considers
          # sufficient hardening. Disable this specific rule so the
          # workflow doesn't nag on every PR while adopting a full
          # per-package pin policy would double the maintenance
          # burden without meaningfully improving supply-chain risk.
          ignore: DL3018

      - name: Upload hadolint SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@ce28f5bb42b7a9f2c824e633a3f6ee835bab6858 # v3.29.0
        with:
          sarif_file: hadolint.sarif
          category: hadolint

  trivy-image:
    name: Trivy image scan
    # Only run after a release publishes a fresh image tag to ghcr.io
    # (or on manual dispatch). Skips PR/main triggers because there is
    # no image tag to scan yet at those points.
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Trivy on the published image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          # Scan the immutable, digest-pinned :latest manifest so
          # this workflow always inspects the artefact users pull.
          image-ref: 'ghcr.io/sebastienrousseau/corral:latest'
          format: 'sarif'
          output: 'trivy.sarif'
          # Only flag high and critical for now — anything below
          # tends to be noise on a minimal Alpine base and adds
          # nothing goreleaser can act on.
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@ce28f5bb42b7a9f2c824e633a3f6ee835bab6858 # v3.29.0
        with:
          sarif_file: trivy.sarif
          category: trivy-image
