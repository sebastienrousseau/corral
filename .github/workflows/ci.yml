name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go CI
    uses: sebastienrousseau/pipelines/.github/workflows/go-ci.yml@main
    with:
      go-version: '1.26.1'
      run-cross-platform: true
      run-coverage: true
