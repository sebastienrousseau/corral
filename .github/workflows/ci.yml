name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  go:
    name: Go CI
    permissions:
      contents: read
    uses: sebastienrousseau/pipelines/.github/workflows/go-ci.yml@186372a9033a4a2ab2c1157866a5a0bc37410683
    with:
      go-version: '1.26.1'
      run-cross-platform: true
      run-coverage: true
