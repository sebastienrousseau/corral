name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck bats
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install bash shellcheck bats-core
          fi
        shell: bash

      - name: Verify Bash 4+
        run: |
          echo "PATH bash: $(which bash) — $(bash --version | head -1)"
          bash -c 'if ((BASH_VERSINFO[0] < 4)); then echo "::error::Bash 4+ required on PATH"; exit 1; fi'
        shell: bash

      - name: Lint and syntax check
        run: bash -c 'make check'
        shell: bash

      - name: Run tests
        run: bash -c 'make test'
        shell: bash
