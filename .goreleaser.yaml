version: 2

project_name: corralctl

# Replace an existing GitHub release on re-run, so a release can be retried
# after adding the Homebrew/AUR publishing secrets.
release:
  mode: replace

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./main.go
    binary: corralctl
    ldflags:
      - -s -w
        -X github.com/sebastienrousseau/corral/cmd.Version={{.Version}}
        -X github.com/sebastienrousseau/corral/internal/tui.Version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

# 1. Native Linux Packages (Debian, Ubuntu, WSL, Fedora, RHEL, openSUSE)
nfpms:
  - id: corralctl-packages
    file_name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    homepage: "https://github.com/sebastienrousseau/corral"
    maintainer: "Sebastien Rousseau <sebastian.rousseau@gmail.com>"
    description: "Automatically clone and organise GitHub repositories by visibility and language."
    license: "GPL-3.0"
    formats:
      - deb
      - rpm
    bindir: /usr/bin

# 2. macOS & Linux Homebrew Tap
brews:
  - repository:
      owner: sebastienrousseau
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/sebastienrousseau/corral"
    description: "Automatically clone and organise GitHub repositories by visibility and language."
    license: "GPL-3.0"
    test: |
      system "#{bin}/corralctl --help"

# 3. Arch Linux / CachyOS (AUR)
aurs:
  - name: corralctl-bin
    homepage: "https://github.com/sebastienrousseau/corral"
    description: "Automatically clone and organise GitHub repositories by visibility and language."
    maintainers:
      - "Sebastien Rousseau"
    license: "GPL-3.0"
    private_key: '{{ .Env.AUR_KEY }}'
    git_url: 'ssh://aur@aur.archlinux.org/corralctl-bin.git'
    package: |-
      # bin
      install -Dm755 "./corralctl" "${pkgdir}/usr/bin/corralctl"
      # license
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/corralctl/LICENSE"

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'