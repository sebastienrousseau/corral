version: 2

project_name: corral

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./main.go
    binary: corral
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

# 1. Native Linux Packages (Debian, Ubuntu, WSL, Fedora, RHEL, openSUSE)
nfpms:
  - id: corral-packages
    file_name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    homepage: "https://github.com/sebastienrousseau/corral"
    maintainer: "Sebastien Rousseau <sebastian.rousseau@gmail.com>"
    description: "Automatically clone and organise GitHub repositories by visibility and language."
    license: "GPL-3.0"
    formats:
      - deb
      - rpm
    bindir: /usr/bin

# 2. macOS & Linux Homebrew Tap
brews:
  - repository:
      owner: sebastienrousseau
      name: homebrew-tap
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/sebastienrousseau/corral"
    description: "Automatically clone and organise GitHub repositories by visibility and language."
    license: "GPL-3.0"
    test: |
      system "#{bin}/corral --help"

# 3. Arch Linux / CachyOS (AUR)
aurs:
  - name: corral-bin
    homepage: "https://github.com/sebastienrousseau/corral"
    description: "Automatically clone and organise GitHub repositories by visibility and language."
    maintainers:
      - "Sebastien Rousseau"
    license: "GPL-3.0"
    private_key: '{{ .Env.AUR_KEY }}'
    git_url: 'ssh://aur@aur.archlinux.org/corral-bin.git'
    package: |-
      # bin
      install -Dm755 "./corral" "${pkgdir}/usr/bin/corral"
      # license
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/corral/LICENSE"

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'