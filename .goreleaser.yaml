version: 2

project_name: corralctl

# Replace an existing GitHub release on re-run, so a release can be retried
# after adding the Homebrew/AUR publishing secrets.
release:
  mode: replace

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./main.go
    binary: corralctl
    ldflags:
      - -s -w
        -X github.com/sebastienrousseau/corral/cmd.Version={{.Version}}
        -X github.com/sebastienrousseau/corral/internal/tui.Version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

# 4. GitHub Container Registry (Docker/OCI) for the MCP Registry entry.
# One image per arch; docker_manifests below fans them into a multi-arch
# manifest under both the version and :latest tags. The io.modelcontextprotocol.
# server.name label is the ownership marker mcp-publisher validates against
# server.json before accepting the registry entry.
dockers:
  - image_templates:
      - "ghcr.io/sebastienrousseau/corral:{{ .Version }}-amd64"
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - --platform=linux/amd64
      - --label=org.opencontainers.image.title={{ .ProjectName }}
      - --label=org.opencontainers.image.description=Corral local index for AI coding agents (Model Context Protocol)
      - --label=org.opencontainers.image.url=https://github.com/sebastienrousseau/corral
      - --label=org.opencontainers.image.source=https://github.com/sebastienrousseau/corral
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.created={{ .Date }}
      - --label=org.opencontainers.image.licenses=GPL-3.0
      - --label=io.modelcontextprotocol.server.name=io.github.sebastienrousseau/corral
  - image_templates:
      - "ghcr.io/sebastienrousseau/corral:{{ .Version }}-arm64"
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - --platform=linux/arm64
      - --label=org.opencontainers.image.title={{ .ProjectName }}
      - --label=org.opencontainers.image.description=Corral local index for AI coding agents (Model Context Protocol)
      - --label=org.opencontainers.image.url=https://github.com/sebastienrousseau/corral
      - --label=org.opencontainers.image.source=https://github.com/sebastienrousseau/corral
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.created={{ .Date }}
      - --label=org.opencontainers.image.licenses=GPL-3.0
      - --label=io.modelcontextprotocol.server.name=io.github.sebastienrousseau/corral

docker_manifests:
  - name_template: "ghcr.io/sebastienrousseau/corral:{{ .Version }}"
    image_templates:
      - "ghcr.io/sebastienrousseau/corral:{{ .Version }}-amd64"
      - "ghcr.io/sebastienrousseau/corral:{{ .Version }}-arm64"
  - name_template: "ghcr.io/sebastienrousseau/corral:latest"
    image_templates:
      - "ghcr.io/sebastienrousseau/corral:{{ .Version }}-amd64"
      - "ghcr.io/sebastienrousseau/corral:{{ .Version }}-arm64"

# Keyless cosign signing of each per-arch image and both manifest tags.
# Uses the sigstore OIDC identity produced by the GitHub Actions runner
# (no long-lived signing key exists). Signatures are pushed alongside
# the image to ghcr.io; users verify with:
#   cosign verify \
#     --certificate-identity-regexp='https://github.com/sebastienrousseau/corral/.github/workflows/release.yml@refs/tags/.*' \
#     --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
#     ghcr.io/sebastienrousseau/corral:0.0.11
docker_signs:
  - cmd: cosign
    args:
      - sign
      - --yes
      - '${artifact}'
    artifacts: manifests
    output: true
  - cmd: cosign
    args:
      - sign
      - --yes
      - '${artifact}'
    artifacts: images
    output: true

# 1. Native Linux Packages (Debian, Ubuntu, WSL, Fedora, RHEL, openSUSE)
nfpms:
  - id: corralctl-packages
    file_name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    homepage: "https://github.com/sebastienrousseau/corral"
    maintainer: "Sebastien Rousseau <sebastian.rousseau@gmail.com>"
    description: "Automatically clone and organise GitHub repositories by visibility and language."
    license: "GPL-3.0"
    formats:
      - deb
      - rpm
    bindir: /usr/bin

# 2. macOS & Linux Homebrew Tap
brews:
  - repository:
      owner: sebastienrousseau
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/sebastienrousseau/corral"
    description: "Automatically clone and organise GitHub repositories by visibility and language."
    license: "GPL-3.0"
    test: |
      system "#{bin}/corralctl --help"

# 3. Arch Linux / CachyOS (AUR)
aurs:
  - name: corralctl-bin
    homepage: "https://github.com/sebastienrousseau/corral"
    description: "Automatically clone and organise GitHub repositories by visibility and language."
    maintainers:
      - "Sebastien Rousseau"
    license: "GPL-3.0"
    private_key: '{{ .Env.AUR_KEY }}'
    git_url: 'ssh://aur@aur.archlinux.org/corralctl-bin.git'
    package: |-
      # bin
      install -Dm755 "./corralctl" "${pkgdir}/usr/bin/corralctl"
      # license
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/corralctl/LICENSE"

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'